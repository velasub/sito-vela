<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Private sailing tours along the Amalfi Coast & Sorrento aboard exclusive yachts. Book directly with our expert skippers for an authentic Mediterranean experience.">
<title>Sailing to Amalfi and Sorrento Coast</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --deep-blue: #122244;
    --sea: #1a4a7a;
    --azure: #2d7dd2;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f7f3ec;
    --white: #ffffff;
    --text-dark: #1a1a2e;
    --text-mid: #3d4a5c;
    --text-light: #8a9ab5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text-dark); font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,22,40,0.96); backdrop-filter: blur(12px); padding: 0 1.5rem; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; color: var(--gold-light); letter-spacing: 0.05em; text-decoration: none; }
  .hamburger { background: none; border: 1px solid rgba(201,168,76,0.4); cursor: pointer; padding: 8px; border-radius: 4px; display: flex; flex-direction: column; gap: 5px; }
  .hamburger span { display: block; width: 22px; height: 1.5px; background: var(--gold-light); transition: all 0.3s; }
  .nav-menu { position: fixed; top: 64px; left: 0; right: 0; background: var(--navy); padding: 1rem 0; transform: translateY(-110%); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); z-index: 999; }
  .nav-menu a { display: block; padding: 1rem 2rem; color: rgba(247,243,236,0.85); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; }

  /* HERO */
  .hero { margin-top: 64px; position: relative; height: 92vh; min-height: 500px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,22,40,0.3), rgba(10,22,40,0.85)); }
  .hero-content { position: relative; z-index: 2; text-align: center; padding: 2rem; max-width: 700px; }
  .hero-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--white); margin-bottom: 1rem; }
  .hero-cta { display: inline-block; padding: 1rem 2rem; border: 1px solid var(--gold); color: var(--gold-light); text-decoration: none; text-transform: uppercase; }

  /* (Il resto del tuo CSS e HTML originale rimane invariato) */
</style>
</head>
<body>
  <nav>
    <a href="#" class="nav-logo">Sailing to Amalfi & Sorrento Coast</a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <div class="nav-menu" id="navMenu">
      <a href="#">Home</a>
      <a href="#fleet">Our Fleet</a>
      <a href="#about">About Us</a>
      <a href="#destinations">Where to Sail</a>
      <a href="#contact">Plan Your Trip</a>
    </div>
  </nav>

  <div class="hero">
    <img class="hero-img" src="foto/hero.jpg" alt="Hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Sailing to Amalfi</h1>
      <a href="#fleet" class="hero-cta">Explore</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('hamburger');
    const menu = document.getElementById('navMenu');
    btn.addEventListener('click', () => { menu.style.transform = menu.style.transform === 'translateY(0%)' ? 'translateY(-110%)' : 'translateY(0%)'; });
  </script>
</body>
</html>
